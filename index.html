<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAVE – Dominio Ilimitado</title>

    <!-- ==================== PWA MANIFEST & META TAGS ==================== -->
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22WAVE%20-%20Dominio%20Ilimitado%22%2C%22short_name%22%3A%22WAVE%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230a0015%22%2C%22theme_color%22%3A%22%239b30ff%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%20100%20100%27%3E%3Ctext%20y%3D%27.9em%27%20font-size%3D%2790%27%3E%F0%9F%8C%8C%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22100x100%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
    <meta name="theme-color" content="#9b30ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WAVE">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌀</text></svg>">

    <!-- ==================== ESTILOS WAVE GOJO SATORU ==================== -->
    <style>
        :root {
            --gojo-purple: #9b30ff;
            --gojo-deep-purple: #4b0082;
            --gojo-void: #0a0015;
            --gojo-blue: #4169e1;
            --gojo-light-blue: #7df9ff;
            --gojo-white: #f0f0ff;
            --gojo-gray: #b0b0d0;
            --glass-bg: rgba(20, 10, 40, 0.65);
            --glass-border: rgba(155, 48, 255, 0.25);
            --glow: 0 0 20px rgba(155, 48, 255, 0.5);
            --glow-strong: 0 0 40px rgba(65, 105, 225, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            background: var(--gojo-void);
            color: var(--gojo-white);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(155, 48, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(65, 105, 225, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(125, 249, 255, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 10% 90%, rgba(155, 48, 255, 0.05) 0%, transparent 30%),
                radial-gradient(circle at 90% 10%, rgba(65, 105, 225, 0.06) 0%, transparent 30%);
            z-index: -1;
            animation: voidPulse 8s ease-in-out infinite alternate;
        }

        @keyframes voidPulse {
            0% { opacity: 0.7; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: var(--gojo-purple);
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0;
            box-shadow: 0 0 10px var(--gojo-purple), 0 0 30px var(--gojo-purple);
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) translateX(100px) scale(1.5); opacity: 0; }
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-bottom: 1px solid var(--glass-border);
            padding: 20px 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .nav {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gojo-purple), var(--gojo-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: var(--glow);
            animation: logoGlow 3s ease-in-out infinite;
        }

        @keyframes logoGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(155, 48, 255, 0.5); }
            50% { box-shadow: 0 0 40px rgba(65, 105, 225, 0.8), 0 0 80px rgba(155, 48, 255, 0.4); }
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 3px;
            background: linear-gradient(135deg, var(--gojo-light-blue), var(--gojo-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 10px rgba(155, 48, 255, 0.5));
        }

        .search-container {
            display: flex;
            gap: 10px;
            align-items: center;
            flex: 1;
            max-width: 500px;
            min-width: 280px;
        }

        #busqueda {
            flex: 1;
            padding: 12px 20px;
            border-radius: 50px;
            border: 2px solid var(--glass-border);
            background: rgba(10, 0, 20, 0.6);
            backdrop-filter: blur(10px);
            color: var(--gojo-white);
            font-size: 1rem;
            transition: all 0.4s ease;
            outline: none;
        }

        #busqueda:focus {
            border-color: var(--gojo-purple);
            box-shadow: var(--glow);
            background: rgba(20, 10, 40, 0.8);
        }

        #busqueda::placeholder {
            color: rgba(176, 176, 208, 0.5);
        }

        .btn {
            padding: 12px 24px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gojo-purple), var(--gojo-blue));
            color: white;
            box-shadow: 0 5px 20px rgba(155, 48, 255, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: var(--glow-strong);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--glass-border);
            color: var(--gojo-white);
        }

        .btn-outline:hover {
            border-color: var(--gojo-purple);
            box-shadow: var(--glow);
            background: rgba(155, 48, 255, 0.1);
        }

        .filters {
            max-width: 1400px;
            margin: 20px auto 0;
            padding: 0 40px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid rgba(155, 48, 255, 0.3);
            background: transparent;
            color: var(--gojo-gray);
            cursor: pointer;
            transition: all 0.4s ease;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .filter-btn.active, .filter-btn:hover {
            background: linear-gradient(135deg, rgba(155, 48, 255, 0.3), rgba(65, 105, 225, 0.3));
            border-color: var(--gojo-purple);
            color: var(--gojo-white);
            box-shadow: 0 0 20px rgba(155, 48, 255, 0.3);
        }

        .main-container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 40px;
            position: relative;
            z-index: 1;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            letter-spacing: 1px;
            background: linear-gradient(135deg, var(--gojo-light-blue), var(--gojo-white));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .section-title::before {
            content: '';
            width: 6px;
            height: 35px;
            background: linear-gradient(to bottom, var(--gojo-purple), var(--gojo-blue));
            border-radius: 6px;
            box-shadow: 0 0 20px rgba(155, 48, 255, 0.6);
            animation: barGlow 2s ease-in-out infinite alternate;
        }

        @keyframes barGlow {
            from { box-shadow: 0 0 10px rgba(155, 48, 255, 0.4); }
            to { box-shadow: 0 0 30px rgba(65, 105, 225, 0.8); }
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .movie-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .movie-card:hover {
            transform: translateY(-15px) scale(1.04);
            box-shadow: 0 20px 50px rgba(155, 48, 255, 0.4), 0 0 80px rgba(65, 105, 225, 0.2);
            border-color: var(--gojo-purple);
            z-index: 10;
        }

        .movie-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, transparent 50%, rgba(10, 0, 20, 0.9) 100%);
            z-index: 1;
            transition: opacity 0.4s ease;
        }

        .movie-card:hover::before {
            opacity: 0.6;
        }

        .movie-poster {
            position: relative;
            aspect-ratio: 2/3;
            overflow: hidden;
        }

        .movie-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .movie-card:hover .movie-poster img {
            transform: scale(1.12);
        }

        .movie-rating {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(10, 0, 20, 0.8);
            backdrop-filter: blur(10px);
            color: #ffd700;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            z-index: 2;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        }

        .movie-type {
            position: absolute;
            top: 12px;
            left: 12px;
            background: linear-gradient(135deg, var(--gojo-purple), var(--gojo-blue));
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 2;
            box-shadow: 0 0 15px rgba(155, 48, 255, 0.5);
        }

        .favorite-btn {
            position: absolute;
            bottom: 15px;
            right: 12px;
            background: rgba(10, 0, 20, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3;
        }

        .favorite-btn:hover {
            transform: scale(1.2);
            box-shadow: 0 0 25px rgba(255, 100, 100, 0.6);
        }

        .favorite-btn.liked {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            box-shadow: 0 0 30px rgba(255, 71, 87, 0.6);
            animation: heartBeat 0.6s ease;
            border-color: #ff4757;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            30% { transform: scale(1.4); }
            60% { transform: scale(0.9); }
        }

        .movie-info {
            padding: 14px;
            position: relative;
            z-index: 2;
            background: rgba(10, 0, 20, 0.4);
            backdrop-filter: blur(5px);
        }

        .movie-title {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--gojo-white);
        }

        .movie-year {
            color: var(--gojo-gray);
            font-size: 0.8rem;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 0, 15, 0.95);
            backdrop-filter: blur(20px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border-radius: 24px;
            max-width: 850px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 35px;
            position: relative;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 60px rgba(155, 48, 255, 0.3), 0 0 120px rgba(65, 105, 225, 0.15);
        }

        .modal-close {
            position: absolute;
            top: 18px;
            right: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: #e74c3c;
            box-shadow: 0 0 25px rgba(231, 76, 60, 0.6);
            transform: rotate(90deg);
        }

        .modal-content {
            display: flex;
            gap: 35px;
            flex-wrap: wrap;
        }

        .modal-poster {
            width: 280px;
            border-radius: 16px;
            flex-shrink: 0;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(155, 48, 255, 0.3);
            border: 2px solid var(--glass-border);
        }

        .modal-details {
            flex: 1;
            min-width: 280px;
        }

        .modal-details h2 {
            font-size: 2.2rem;
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--gojo-light-blue), var(--gojo-white));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-meta {
            display: flex;
            gap: 20px;
            color: var(--gojo-gray);
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .modal-overview {
            line-height: 1.8;
            color: var(--gojo-gray);
            font-size: 0.95rem;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--gojo-gray);
        }

        .empty-state .icon {
            font-size: 5rem;
            margin-bottom: 25px;
            opacity: 0.4;
            animation: floatIcon 3s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @media (max-width: 768px) {
            .header, .filters, .main-container {
                padding-left: 15px;
                padding-right: 15px;
            }

            .nav {
                justify-content: center;
                text-align: center;
            }

            .movies-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 15px;
            }

            .modal-content {
                flex-direction: column;
                align-items: center;
            }

            .modal-poster {
                width: 220px;
            }

            .modal-details h2 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

    <!-- Partículas flotantes -->
    <div class="particles" id="particles"></div>

    <!-- Header -->
    <header class="header">
        <nav class="nav">
            <div class="logo-container">
                <div class="logo-icon">∞</div>
                <span class="logo-text">WAVE</span>
            </div>
            <div class="search-container">
                <input type="text" id="busqueda" placeholder="Dominio Ilimitado..." onkeypress="if(event.key==='Enter') buscar()">
                <button class="btn btn-primary" onclick="buscar()">🔮 Buscar</button>
            </div>
            <button class="btn btn-outline" onclick="mostrarFavoritos()">♾️ Mi Lista (<span id="contadorFavs">0</span>)</button>
        </nav>
        <div class="filters">
            <button class="filter-btn active" onclick="cambiarFiltro('all', this)">🌀 Todo</button>
            <button class="filter-btn" onclick="cambiarFiltro('movie', this)">🎬 Películas</button>
            <button class="filter-btn" onclick="cambiarFiltro('tv', this)">📺 Series</button>
            <button class="filter-btn" onclick="cambiarFiltro('anime', this)">🍥 Anime</button>
        </div>
    </header>

    <main class="main-container">
        <section id="seccionBusqueda" style="display:none;">
            <h2 class="section-title">Resultados del Vacío</h2>
            <div class="movies-grid" id="resultados"></div>
        </section>

        <section id="seccionFavoritos">
            <h2 class="section-title">♾️ Mi Dominio Personal</h2>
            <div class="movies-grid" id="listaFavoritos"></div>
            <div class="empty-state" id="emptyFavs">
                <div class="icon">🌀</div>
                <p style="font-size:1.3rem; font-weight:600;">El vacío reina aquí...</p>
